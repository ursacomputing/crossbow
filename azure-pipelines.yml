jobs:
- job: linux
  pool:
    vmImage: ubuntu-latest
  timeoutInMinutes: 360
  variables:
    DEBIAN: 12
    GO: 1.22
    STATICCHECK: latest

  steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.8'

  - script: |
      git clone --no-checkout --branch maint-16.0.0 https://github.com/apache/arrow.git arrow
      git -C arrow checkout bcde34aead04be84e09afe7d4974e5fb2e1e3068
      git -C arrow submodule update --init --recursive
    displayName: Clone arrow


  - script: pip install -e arrow/dev/archery[docker]
    displayName: Setup Archery

  - script: |
      archery --debug docker --using-docker-cli run \
        -e ARROW_DOCS_VERSION="16.0.0.dev484" \
        -e SETUPTOOLS_SCM_PRETEND_VERSION="16.0.0.dev484" \
         \
        debian-go \
        
    displayName: Execute Docker Build
    env:
      AWS_ACCESS_KEY_ID: "$(AWS_ACCESS_KEY_ID)"
      AWS_SECRET_ACCESS_KEY: "$(AWS_SECRET_ACCESS_KEY)"
      SCCACHE_BUCKET: "$(SCCACHE_BUCKET)"
      SCCACHE_REGION: "$(SCCACHE_REGION)"
      SCCACHE_S3_KEY_PREFIX: "sccache"



