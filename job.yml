    name: test-ubuntu-24.04-cpp-gcc-14
    ci: github
    template: docker-tests/github.linux.yml
    artifacts: []
    params:
      env:
        CLANG_TOOLS: 15
        GCC_VERSION: 14
        LLVM: 15
        UBUNTU: 24.04
      # rapidjson 1.1.0 has an error caught by gcc 14.
