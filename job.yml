  test-conda-python-3.12-pandas-latest-numpy-latest: !Task
    name: test-conda-python-3.12-pandas-latest-numpy-latest
    ci: github
    template: docker-tests/github.linux.yml
    artifacts: []
    params:
      env:
        PYTHON: '3.12'
        PANDAS: latest
        NUMPY: latest
        # ensure we have at least one build with parquet encryption disabled
        PARQUET_REQUIRE_ENCRYPTION: OFF
