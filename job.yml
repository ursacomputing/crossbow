  test-r-fedora-clang: !Task
    name: test-r-fedora-clang
    ci: github
    template: docker-tests/github.linux.yml
    artifacts: []
    params:
      image: fedora-r-clang
      # R-devel built from source with Clang, simulating CRAN's
