# NOTE: must set "Crossbow" as name to have the badge links working in the
# github comment reports!
name: Crossbow
on:
  push:
    branches:
      - "*-github-*"

env:
  ARCHERY_DEBUG: 1


jobs:
  macos-cran:
    name: "m1-san on macOS"
    runs-on: macOS-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout Arrow
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: arrow
          repository: jonkeane/arrow
          ref: 45bebcca04ecfd6ee6d8f637c18df1500dfb50cc
          submodules: recursive


      - name: Configure dependencies (macos)
        run: |
          brew install openssl
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: devel
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: false # cache does not work on across branches
          working-directory: arrow/r
          extra-packages: |
            any::rcmdcheck
            any::sys
      - name: Compile with sanitizers
        run: |
          # From rhub/rhub's m1-san:
          # https://github.com/r-hub/actions/blob/ab9b2fb5021f43bfd0ee977932e0a14d25f6e59e/run-check/scripts/mac-asan.sh
          # Use XCode 16.2 ------------------------------------------------
          sudo rm -f /Applications/Xcode.app
          sudo ln -sfF /Applications/Xcode_16.2.app /Applications/Xcode.app
          sudo xcode-select -s /Applications/Xcode.app

          # Compile with sanitizers ---------------------------------------
          mkdir -p ~/.R
          cat >> ~/.R/Makevars <<EOF
          CC+=-mmacos-version-min=15 -fsanitize=address,undefined
          CXX+=-mmacos-version-min=15 -fsanitize=address,undefined
          CXX11+=-mmacos-version-min=15 -fsanitize=address,undefined
          CXX14+=-mmacos-version-min=15 -fsanitize=address,undefined
          CXX17+=-mmacos-version-min=15 -fsanitize=address,undefined
          CXX20+=-mmacos-version-min=15 -fsanitize=address,undefined
          CXX23+=-mmacos-version-min=15 -fsanitize=address,undefined
          REC_INSTALL_OPT=--dsym
          EOF

          # Need to patch the shell script, because these env vars --------
          # do not go through a shell because of Apple security.
          R=$(readlink `which R`)
          head -1 ${R} >> /tmp/R
          cat >> /tmp/R <<EOF
          export DYLD_FORCE_FLAT_NAMESPACE=1
          export DYLD_INSERT_LIBRARIES=/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/16/lib/darwin/libclang_rt.asan_osx_dynamic.dylib
          EOF
          cat ${R} >> /tmp/R
          chmod +x /tmp/R
          sudo mv /tmp/R ${R}
      - name: Install
        env:
          _R_CHECK_CRAN_INCOMING_: false
          CFLAGS: "-falign-functions=8 -g -O2 -Wall -pedantic -Wconversion -Wno-sign-conversion -Wstrict-prototypes"
          CXXFLAGS: "-g -O2 -Wall -pedantic -Wconversion -Wno-sign-conversion"
          NOT_CRAN: false
        run: |
          cd arrow/r
          R CMD INSTALL . --install-tests
      - name: Run the tests
        run: R -e 'if(tools::testInstalledPackage("arrow") != 0L) stop("There was a test failure.")'
      - name: Check for UBSAN errors
        run: |
          # Fail for UBSAN errors
          out <- dir("check", recursive=TRUE, pattern = "[.]Rout", full.names = TRUE)
          fail <- 0
          for (of in out) {
            l <- readLines(of, warn = FALSE)
            if (any(grepl("SUMMARY: UndefinedBehaviorSanitizer:", l, fixed = TRUE))) {
              fail <- 1
              break
            }
            if (any(grepl("runtime error:", l, fixed = TRUE))) {
              fail <- 1
              break
            }
          }
          q(save = "no", status = fail)
        shell: Rscript {0}
      - name: Dump test logs
        run: cat arrow-tests/testthat.Rout*
        if: failure()
      - name: Save the test output
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: arrow-tests/testthat.Rout*
        if: always()