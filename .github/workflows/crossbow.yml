# NOTE: must set "Crossbow" as name to have the badge links working in the
# github comment reports!
name: Crossbow
on:
  push:
    branches:
      - "*-github-*"

env:
  ARCHERY_DEBUG: 1


permissions:
  packages: write

jobs:
  build:
    name: "Build wheel for musllinux 1-2"
    runs-on: alpine-3.18-arm
    env:
      # archery uses these environment variables
      ARCH: arm64v8
      PYTHON: "3.13"
      PYTHON_ABI_TAG: "cp313"
      PYTHON_IMAGE_TAG: "3.13-rc"

    steps:
      - name: Checkout Arrow
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: arrow
          repository: nveloso/arrow
          ref: 732fc35238954a881e3dc87044d2386db95e92e6
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          cache: 'pip'
          python-version: 3.12
      - name: Install Archery
        shell: bash
        run: pip install -e arrow/dev/archery[all]

      - name: Login to Dockerhub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Prepare
        run: |
          if [ "${PYTHON_ABI_TAG}" = "cp313t" ]; then
            test_image_prefix=python-free-threaded
          else
            test_image_prefix=python
          fi
          echo "TEST_IMAGE_PREFIX=${test_image_prefix}" >> ${GITHUB_ENV}

      - name: Build wheel
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          archery docker run \
            -e SETUPTOOLS_SCM_PRETEND_VERSION=20.0.0.dev66 \
            python-wheel-musllinux-1-2

      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: arrow/python/repaired_wheels/*.whl

      # TODO(kszucs): auditwheel show
      - name: Test wheel
        shell: bash
        run: |
          source arrow/ci/scripts/util_enable_core_dumps.sh
          archery docker run ${TEST_IMAGE_PREFIX}-wheel-musllinux-test-imports
          archery docker run ${TEST_IMAGE_PREFIX}-wheel-musllinux-test-unittests

      - name: Test wheel on Alpine 3.18
        shell: bash
        if: |
          '3.13' == '3.9'
        env:
          ALPINE_LINUX: "3.18"
        run: |
          archery docker run \
            -e ARROW_GANDIVA=OFF \
            -e TEST_DEFAULT=0 \
            -e TEST_PYARROW_VERSION=20.0.0.dev66 \
            -e TEST_PYTHON_VERSIONS=3.13 \
            -e TEST_WHEEL_PLATFORM_TAGS=musllinux_1_2_aarch64 \
            -e TEST_WHEELS=1 \
            alpine-linux-verify-rc

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - name: Checkout Crossbow
        uses: actions/checkout@v4
        with:
          path: crossbow
          ref: actions-d80189b582
      - name: Setup Crossbow
        shell: bash
        run: |
          python3 -m pip install -e arrow/dev/archery[crossbow]
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Upload artifacts
        shell: bash
        run: |
          archery crossbow \
            --queue-path $(pwd)/crossbow \
            --queue-remote https://github.com/ursacomputing/crossbow \
            upload-artifacts \
            --sha actions-d80189b582-github-wheel-musllinux-1-2-cp313-cp313-arm64 \
            --tag actions-d80189b582-github-wheel-musllinux-1-2-cp313-cp313-arm64 \
            "arrow/python/repaired_wheels/*.whl"
        env:
          CROSSBOW_GITHUB_TOKEN: ${{ secrets.CROSSBOW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Verify uploaded artifacts
        shell: bash
        run: |
          archery crossbow \
            --queue-path $(pwd)/crossbow \
            --queue-remote https://github.com/ursacomputing/crossbow \
            status \
            --task-filter 'wheel-musllinux-1-2-cp313-cp313-arm64' \
            --no-fetch \
            --validate \
            actions-d80189b582
        env:
          CROSSBOW_GITHUB_TOKEN: ${{ secrets.CROSSBOW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      
      

