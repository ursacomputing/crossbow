# NOTE: must set "Crossbow" as name to have the badge links working in the
# github comment reports!
name: Crossbow
on:
  push:
    branches:
      - "*-github-*"

env:
  ARCHERY_DEBUG: 1


jobs:
  test:
    name: |
      Docker Test  ubuntu-cuda-cpp 
    runs-on: ['self-hosted', 'cuda']

    timeout-minutes: 60
    steps:
      - name: Checkout Arrow
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: arrow
          repository: apache/arrow
          ref: ee86db57bb771dbdb5f2fca5890854f27e6aa964
          submodules: recursive

      # python 3.8 is installed on the runner, no need to install
      - name: Install archery
        run: python -m pip install -e arrow/dev/archery[docker]
      - name: Execute Docker Build
        shell: bash
        env:
          ARCHERY_USE_LEGACY_DOCKER_COMPOSE: 1
          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          SCCACHE_BUCKET: "${{ secrets.SCCACHE_BUCKET }}"
          SCCACHE_REGION: "${{ secrets.SCCACHE_REGION }}"
          SCCACHE_S3_KEY_PREFIX: "sccache"

        run: |
          archery docker run \
            -e SETUPTOOLS_SCM_PRETEND_VERSION="18.0.0.dev132" \
             \
            ubuntu-cuda-cpp \
            
      - name: Login to Dockerhub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image
        shell: bash
        run: archery docker push ubuntu-cuda-cpp
